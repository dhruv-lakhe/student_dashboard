{% load static %}
<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
      <title>Student Dashboard | Sign Up</title>
      
      <!-- Favicon -->
      <link rel="shortcut icon" href="{% static 'assets/images/favicon.ico' %}" />
      
      <!-- Library / Plugin Css Build -->
      <link rel="stylesheet" href="{% static 'assets/css/core/libs.min.css' %}" />
      
      <!-- Hope Ui Design System Css -->
      <link rel="stylesheet" href="{% static 'assets/css/hope-ui.min.css' %}" />
      
      <!-- Custom Css -->
      <link rel="stylesheet" href="{% static 'assets/css/custom.min.css' %}" />
      
      <!-- Dark Css -->
      <link rel="stylesheet" href="{% static 'assets/css/dark.min.css' %}" />
      
      <!-- Customizer Css -->
      <link rel="stylesheet" href="{% static 'assets/css/customizer.min.css' %}" />
      
      <!-- RTL Css -->
      <link rel="stylesheet" href="{% static 'assets/css/rtl.min.css' %}" />
      
  </head>
  <body class=" " data-bs-spy="scroll" data-bs-target="#elements-section" data-bs-offset="0" tabindex="0">
    <!-- loader Start -->
    <div id="loading">
      <div class="loader simple-loader">
          <div class="loader-body"></div>
      </div>
    </div>
    <!-- loader END -->
    
    <div class="wrapper">
      <section class="login-content">
         <div class="row m-0 align-items-center bg-white vh-100">            
               <div class="col-md-6 d-md-block d-none bg-primary p-0 mt-n1 vh-100 overflow-hidden">
               <img src="{% static 'assets/images/auth/05.png' %}" class="img-fluid gradient-main animated-scaleX" alt="images">
            </div>
            <div class="col-md-6">               
               <div class="row justify-content-center">
                  <div class="col-md-10">
                     <div class="card card-transparent auth-card shadow-none d-flex justify-content-center mb-0">
                        <div class="card-body">
                           <a href="" class="navbar-brand d-flex align-items-center mb-3">
                              <!--Logo start-->
                              <div class="logo-main">
                                  <div class="logo-normal">
                                      <svg class="text-primary icon-30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
                                          <rect x="-0.757324" y="19.2427" width="28" height="4" rx="2" transform="rotate(-45 -0.757324 19.2427)" fill="currentColor"/>
                                          <rect x="7.72803" y="27.728" width="28" height="4" rx="2" transform="rotate(-45 7.72803 27.728)" fill="currentColor"/>
                                          <rect x="10.5366" y="16.3945" width="16" height="4" rx="2" transform="rotate(45 10.5366 16.3945)" fill="currentColor"/>
                                          <rect x="10.5562" y="-0.556152" width="28" height="4" rx="2" transform="rotate(45 10.5562 -0.556152)" fill="currentColor"/>
                                      </svg>
                                  </div>
                                  <div class="logo-mini">
                                      <svg class="text-primary icon-30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
                                          <rect x="-0.757324" y="19.2427" width="28" height="4" rx="2" transform="rotate(-45 -0.757324 19.2427)" fill="currentColor"/>
                                          <rect x="7.72803" y="27.728" width="28" height="4" rx="2" transform="rotate(-45 7.72803 27.728)" fill="currentColor"/>
                                          <rect x="10.5366" y="16.3945" width="16" height="4" rx="2" transform="rotate(45 10.5366 16.3945)" fill="currentColor"/>
                                          <rect x="10.5562" y="-0.556152" width="28" height="4" rx="2" transform="rotate(45 10.5562 -0.556152)" fill="currentColor"/>
                                      </svg>
                                  </div>
                              </div>
                              <!--logo End-->
                              <h4 class="logo-title ms-3">Student Dash</h4>
                           </a>
                           
                           <h2 class="mb-2 text-center">Sign Up</h2>
                           <p class="text-center">Create your Student account.</p>
                           
                           <!-- Display error/success messages -->
                           {% if messages %}
                               {% for message in messages %}
                               <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                                   {{ message }}
                                   <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                               </div>
                               {% endfor %}
                           {% endif %}
                           
                           <!-- Registration Form -->
                           <form method="POST" action="{% url 'register' %}" id="registrationForm">
                              {% csrf_token %}
                              
                              <div class="row">
                                 <!-- First Name -->
                                 <div class="col-lg-6">
                                    <div class="form-group">
                                       <label for="first_name" class="form-label">First Name</label>
                                       <input type="text" 
                                              class="form-control" 
                                              id="first_name" 
                                              name="first_name"
                                              value="{{ first_name|default:'' }}"
                                              placeholder="John" 
                                              required
                                              minlength="2">
                                    </div>
                                 </div>
                                 
                                 <!-- Last Name -->
                                 <div class="col-lg-6">
                                    <div class="form-group">
                                       <label for="last_name" class="form-label">Last Name</label>
                                       <input type="text" 
                                              class="form-control" 
                                              id="last_name" 
                                              name="last_name"
                                              value="{{ last_name|default:'' }}"
                                              placeholder="Doe" 
                                              required
                                              minlength="2">
                                    </div>
                                 </div>
                                 
                                 <!-- Email (will be used as username) -->
                                 <div class="col-lg-12">
                                    <div class="form-group">
                                       <label for="email" class="form-label">Email</label>
                                       <input type="email" 
                                              class="form-control" 
                                              id="email" 
                                              name="email"
                                              value="{{ email|default:'' }}"
                                              placeholder="student@example.com" 
                                              required>
                                       <small class="form-text text-muted">
                                           This email will be your username for login
                                       </small>
                                    </div>
                                 </div>
 
                                 <!-- Password -->
                                 <div class="col-lg-6">
                                    <div class="form-group">
                                       <label for="password" class="form-label">Password</label>
                                       <input type="password" 
                                              class="form-control" 
                                              id="password" 
                                              name="password"
                                              placeholder="Min. 8 characters" 
                                              required
                                              minlength="8">
                                    </div>
                                 </div>
                                 
                                 <!-- Confirm Password -->
                                 <div class="col-lg-6">
                                    <div class="form-group">
                                       <label for="confirm_password" class="form-label">Confirm Password</label>
                                       <input type="password" 
                                              class="form-control" 
                                              id="confirm_password" 
                                              name="confirm_password"
                                              placeholder="Re-enter password" 
                                              required
                                              minlength="8">
                                       <small id="passwordMatch" class="form-text"></small>
                                    </div>
                                 </div>
                                 
                                 <!-- Terms Checkbox -->
                                 <div class="col-lg-12 d-flex justify-content-center">
                                    <div class="form-check mb-3">
                                       <input type="checkbox" 
                                              class="form-check-input" 
                                              id="terms_accepted"
                                              name="terms_accepted"
                                              value="1"
                                              required>
                                       <label class="form-check-label" for="terms_accepted">
                                           I agree with the terms of use
                                       </label>
                                    </div>
                                 </div>
                              </div>
                              
                              <!-- Submit Button -->
                              <div class="d-flex justify-content-center">
                                 <button type="submit" class="btn btn-primary" id="submitBtn">
                                     Sign Up
                                 </button>
                              </div>
                              
                              <!-- Sign In Link -->
                              <p class="mt-3 text-center">
                                 Already have an Account? 
                                 <a href="{% url 'signin' %}" class="text-underline">Sign In</a>
                              </p>
                           </form>
                           
                        </div>
                     </div>    
                  </div>
               </div>           
               <div class="sign-bg sign-bg-right">
                  <svg width="280" height="230" viewBox="0 0 421 359" fill="none" xmlns="http://www.w3.org/2000/svg">
                     <g opacity="0.05">
                        <rect x="-15.0845" y="154.773" width="543" height="77.5714" rx="38.7857" transform="rotate(-45 -15.0845 154.773)" fill="#3A57E8"/>
                        <rect x="149.47" y="319.328" width="543" height="77.5714" rx="38.7857" transform="rotate(-45 149.47 319.328)" fill="#3A57E8"/>
                        <rect x="203.936" y="99.543" width="310.286" height="77.5714" rx="38.7857" transform="rotate(45 203.936 99.543)" fill="#3A57E8"/>
                        <rect x="204.316" y="-229.172" width="543" height="77.5714" rx="38.7857" transform="rotate(45 204.316 -229.172)" fill="#3A57E8"/>
                     </g>
                  </svg>
               </div>
            </div>   
         </div>
      </section>
    </div>
    
  <!-- Library Bundle Script -->
  <script src="{% static 'assets/js/core/libs.min.js' %}"></script>

  <!-- External Library Bundle Script -->
  <script src="{% static 'assets/js/core/external.min.js' %}"></script>

  <!-- Widgetchart Script -->
  <script src="{% static 'assets/js/charts/widgetcharts.js' %}"></script>

  <!-- mapchart Script -->
  <script src="{% static 'assets/js/charts/vectore-chart.js' %}"></script>
  <script src="{% static 'assets/js/charts/dashboard.js' %}"></script>

  <!-- fslightbox Script -->
  <script src="{% static 'assets/js/plugins/fslightbox.js' %}"></script>

  <!-- Settings Script -->
  <script src="{% static 'assets/js/plugins/setting.js' %}"></script>

  <!-- Slider-tab Script -->
  <script src="{% static 'assets/js/plugins/slider-tabs.js' %}"></script>

  <!-- Form Wizard Script -->
  <script src="{% static 'assets/js/plugins/form-wizard.js' %}"></script>

  <!-- App Script -->
  <script src="{% static 'assets/js/hope-ui.js' %}" defer></script>

  <!-- Form Validation JavaScript -->
  <script>
    // Real-time password matching feedback
    document.getElementById('confirm_password').addEventListener('input', function() {
        const password = document.getElementById('password').value;
        const confirmPassword = this.value;
        const matchText = document.getElementById('passwordMatch');
        
        if (confirmPassword === '') {
            matchText.textContent = '';
            matchText.className = 'form-text';
        } else if (password === confirmPassword) {
            matchText.textContent = '✓ Passwords match';
            matchText.className = 'form-text text-success';
        } else {
            matchText.textContent = '✗ Passwords do not match';
            matchText.className = 'form-text text-danger';
        }
    });
    
    // Form submission validation
    document.getElementById('registrationForm').addEventListener('submit', function(e) {
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm_password').value;
        const terms = document.getElementById('terms_accepted').checked;
        
        // Check password match
        if (password !== confirmPassword) {
            e.preventDefault();
            alert('Passwords do not match!');
            document.getElementById('confirm_password').focus();
            return false;
        }
        
        // Check terms acceptance
        if (!terms) {
            e.preventDefault();
            alert('You must agree to the terms of use to sign up.');
            return false;
        }
        
        // Disable submit button to prevent double submission
        document.getElementById('submitBtn').disabled = true;
        document.getElementById('submitBtn').innerHTML = 'Creating Account...';
        
        return true;
    });
  </script>

  </body>
</html>
